<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StemDrop-Ableton</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>StemDrop-Ableton</h1>
          <p>Lokaler Stem-Austausch fuer zwei Clients im gleichen Netzwerk.</p>
        </div>
        <div class="status" id="connectionStatus">Offline</div>
      </section>

      <section class="grid">
        <div class="panel control-panel">
          <h2>Session</h2>
          <div class="actions">
            <button id="startServer">Start Server</button>
            <button id="connectRoom">Verbinde zu Room</button>
          </div>
          <div class="fields">
            <label>Server-IP <input id="serverIp" value="127.0.0.1"></label>
            <label>Port <input id="serverPort" value="8787"></label>
            <label>Room-Code <input id="roomInput" placeholder="ABC123"></label>
          </div>
          <div class="room-display">
            <span>Room-Code</span>
            <strong id="roomCode">-</strong>
          </div>
          <div class="client-display">
            <span>Verbundene Clients</span>
            <strong id="clientCount">0 / 2</strong>
          </div>
          <div class="folder-actions">
            <button id="openOutgoing">Outgoing-Ordner</button>
            <button id="openIncoming">Incoming-Ordner</button>
          </div>
        </div>

        <div class="panel drop-panel" id="dropZone">
          <h2>Datei senden</h2>
          <div class="drop-target">
            <div class="drop-icon">WAV</div>
            <p>Dateien aus <strong>shared/outgoing</strong> hier ablegen</p>
            <small>Unterstuetzt: WAV, AIFF, MP3</small>
          </div>
          <div id="progressList" class="progress-list"></div>
        </div>

        <div class="panel history-panel">
          <div class="history-head">
            <h2>Transfer-History</h2>
            <button id="refreshHistory">Aktualisieren</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>

        <div class="panel log-panel">
          <h2>Status</h2>
          <pre id="logOutput"></pre>
        </div>
      </section>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
